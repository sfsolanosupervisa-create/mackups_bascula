<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Interfaz de Monitoreo · Supervisa</title>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#2f3e50"/>
  <rect x="30" y="80" width="140" height="40" fill="#1a1a1a" stroke="#ff9b3d" stroke-width="3"/>
  <rect x="70" y="88" width="60" height="24" rx="2" fill="#8b5a3c"/>
  <rect x="130" y="88" width="18" height="24" rx="2" fill="#2c5b8a"/>
  <circle cx="100" cy="50" r="8" fill="#5cb85c"/>
  <circle cx="100" cy="150" r="8" fill="#f0b429"/>
</svg>
</template>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="monitoring.jsx"></script>

<script type="text/babel" data-presets="react">
const ALL_BASCULAS = [
  { id: 'b1', label: 'Báscula 1' },
  { id: 'b2', label: 'Báscula 2' },
];

function App() {
  const [step1, setStep1] = React.useState(0);
  const [step2, setStep2] = React.useState(0);
  const [active, setActive] = React.useState('b1'); // selected bascula being controlled
  const [modalOpen, setModalOpen] = React.useState(false);
  const [modalSource, setModalSource] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [refreshing, setRefreshing] = React.useState(false);
  const [tags, setTags] = React.useState([
    { id:'b1', label:'Báscula 1' },
    { id:'b2', label:'Báscula 2' },
  ]);

  const submitForm = (form) => {
    setModalOpen(false);
    setToast(`Pesaje enviado: ${form.placa} · ${form.peso} Kg`);
    setTimeout(() => setToast(null), 2400);
    if (modalSource === 'b1') setStep1(0);
    if (modalSource === 'b2') setStep2(0);
  };

  const refresh = () => {
    setRefreshing(true);
    setTimeout(() => setRefreshing(false), 700);
  };

  const removeTag = (id) => {
    setTags(t => {
      const next = t.filter(x => x.id !== id);
      // If we removed the active one, select the other if present
      if (id === active && next.length > 0) setActive(next[0].id);
      return next;
    });
  };

  const addTag = (id) => {
    const def = ALL_BASCULAS.find(b => b.id === id);
    if (!def) return;
    setTags(t => t.find(x => x.id === id) ? t : [...t, def]);
    setActive(id);
  };

  const liveStep1 = window.STEPS_B1[step1];
  const liveStep2 = window.STEPS_B2[step2];

  // Auto-loop: when reaching a step marked autoLoop, jump back to step 0 after a delay
  React.useEffect(() => {
    if (liveStep1.autoLoop) {
      const t = setTimeout(() => setStep1(0), 3400);
      return () => clearTimeout(t);
    }
  }, [step1]);
  React.useEffect(() => {
    if (liveStep2.autoLoop) {
      const t = setTimeout(() => setStep2(0), 3400);
      return () => clearTimeout(t);
    }
  }, [step2]);

  const isShown = (id) => !!tags.find(t => t.id === id);
  const missing = ALL_BASCULAS.filter(b => !isShown(b.id));

  // active step glue
  const activeIsB1 = active === 'b1' && isShown('b1');
  const activeIsB2 = active === 'b2' && isShown('b2');
  // if active not shown, fall back
  React.useEffect(() => {
    if (!isShown(active) && tags.length > 0) setActive(tags[0].id);
  }, [tags]);

  const activeStep = activeIsB1 ? step1 : activeIsB2 ? step2 : 0;
  const activeTotal = activeIsB1 ? window.STEPS_B1.length : activeIsB2 ? window.STEPS_B2.length : 1;
  const activeLabel = activeIsB1 ? 'Báscula 1' : activeIsB2 ? 'Báscula 2' : '—';
  const setActiveStep = (n) => {
    if (activeIsB1) setStep1(n);
    else if (activeIsB2) setStep2(n);
  };

  const openModal = (src, plate, weight) => {
    setModalSource(src);
    setModalOpen(true);
  };

  return (
    <div className="app" data-screen-label="Interfaz de Monitoreo">
      <window.Sidebar/>
      <main className="main">
        <div className="topbar">
          <div className="topbar__crumbs">
            <span className="topbar__crumbs-dot">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
            </span>
            <strong>Supervisa</strong>
            <span>/</span>
            <span>Soporte Supervisa</span>
          </div>
          <span className="topbar__gear">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </span>
        </div>

        <div className="page">
          <div className="page__toolbar">
            <div className="tag-select">
              {tags.map(t => (
                <span key={t.id} className="tag-chip">
                  {t.label}
                  <span className="tag-chip__x" onClick={() => removeTag(t.id)}>×</span>
                </span>
              ))}
              {missing.map(b => (
                <button key={b.id} className="tag-add" onClick={() => addTag(b.id)} title={`Agregar ${b.label}`}>
                  + {b.label}
                </button>
              ))}
              <span className="tag-select__caret">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
              </span>
            </div>
            <button className={'btn-refresh' + (refreshing ? ' btn-refresh--spin' : '')} onClick={refresh}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
            </button>
          </div>

          <div className="cards-wrap">
            <div className={'cards-grid' + (tags.length === 1 ? ' cards-grid--single' : '')}>
              {isShown('b1') && (
                <window.BasculaCard
                  title="Báscula 1"
                  step={liveStep1}
                  interactive={true}
                  isSelected={active === 'b1'}
                  onSelect={() => setActive('b1')}
                  onOpenModal={() => openModal('b1', liveStep1.plate, liveStep1.weight)}
                  onLiberar={() => {
                    alert('Báscula liberada correctamente');
                    setStep1(4);
                  }}
                />
              )}
              {isShown('b2') && (
                <window.BasculaCard
                  title="Báscula 2"
                  step={liveStep2}
                  interactive={true}
                  isSelected={active === 'b2'}
                  onSelect={() => setActive('b2')}
                  onOpenModal={() => openModal('b2', liveStep2.plate, liveStep2.weight)}
                  onLiberar={() => {
                    alert('Báscula liberada correctamente');
                    setStep2(6);
                  }}
                />
              )}
              {tags.length === 0 && (
                <div className="cards-empty">
                  Selecciona una báscula para visualizar su estado.
                </div>
              )}
            </div>
          </div>

          {tags.length > 0 && (
            <window.StepBar
              step={activeStep}
              totalSteps={activeTotal}
              setStep={setActiveStep}
              activeLabel={activeLabel}
            />
          )}
        </div>
      </main>

      {modalOpen && (
        <window.GestionModal
          onClose={() => setModalOpen(false)}
          onSubmit={submitForm}
          plate={modalSource === 'b1' ? liveStep1.plate : liveStep2.plate}
          weight={modalSource === 'b1' ? liveStep1.weight : liveStep2.weight}
        />
      )}

      {toast && (
        <div className="toast">
          <span style={{color:'#6ec53c'}}>✓</span> {toast}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
